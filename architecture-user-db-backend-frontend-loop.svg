<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="User to Database to Backend to Frontend architecture loop">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="100%" stop-color="#f7fff8"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f9fcff"/>
    </linearGradient>
    <style>
      .title { font: 700 52px 'Segoe UI', Arial, sans-serif; fill: #1c2f4e; }
      .subtitle { font: 400 24px 'Segoe UI', Arial, sans-serif; fill: #4b6381; }
      .stage { font: 700 30px 'Segoe UI', Arial, sans-serif; fill: #1f3556; }
      .text { font: 400 21px 'Segoe UI', Arial, sans-serif; fill: #365272; }
      .chip { font: 600 18px 'Segoe UI', Arial, sans-serif; fill: #17395f; }
      .node { fill: url(#panel); stroke: #a5bcdb; stroke-width: 2.4; rx: 26; }
      .inner { fill: #eef5ff; stroke: #bed0ea; stroke-width: 1.6; rx: 14; }
      .flow { stroke: #3d649e; stroke-width: 4.5; fill: none; marker-end: url(#arrow); }
      .loop { stroke-dasharray: 12 10; }
    </style>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M0,0 L14,7 L0,14 z" fill="#3d649e"/>
    </marker>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>

  <text x="90" y="92" class="title">Recommendation Loop Architecture</text>
  <text x="90" y="132" class="subtitle">Simple presentation flow: User -> Database -> Backend -> Frontend -> User</text>

  <!-- Main nodes -->
  <rect x="110" y="250" width="360" height="390" class="node"/>
  <text x="150" y="320" class="stage">1. User</text>
  <text x="150" y="365" class="text">Reads stories</text>
  <text x="150" y="400" class="text">Clicks and scrolls</text>
  <text x="150" y="435" class="text">Likes and bookmarks</text>

  <rect x="510" y="200" width="520" height="500" class="node"/>
  <text x="550" y="270" class="stage">2. Database Layer</text>
  <text x="550" y="312" class="text">Central storage for personalization data</text>

  <rect x="550" y="345" width="440" height="58" class="inner"/>
  <text x="575" y="382" class="chip">Algorithm State and Scoring Signals</text>

  <rect x="550" y="420" width="210" height="58" class="inner"/>
  <text x="596" y="457" class="chip">Bookmarks</text>

  <rect x="780" y="420" width="210" height="58" class="inner"/>
  <text x="858" y="457" class="chip">Likes</text>

  <rect x="550" y="495" width="440" height="58" class="inner"/>
  <text x="688" y="532" class="chip">Profile Info</text>

  <rect x="1070" y="250" width="350" height="390" class="node"/>
  <text x="1108" y="320" class="stage">3. Backend API</text>
  <text x="1108" y="365" class="text">Pulls database state</text>
  <text x="1108" y="400" class="text">Runs feed logic</text>
  <text x="1108" y="435" class="text">Serves API responses</text>

  <rect x="1460" y="250" width="350" height="390" class="node"/>
  <text x="1498" y="320" class="stage">4. Frontend App</text>
  <text x="1498" y="365" class="text">Calls backend APIs</text>
  <text x="1498" y="400" class="text">Displays ranked stories</text>
  <text x="1498" y="435" class="text">Shows bookmarks and likes</text>

  <!-- Primary flow arrows -->
  <path d="M470 445 L508 445" class="flow"/>
  <path d="M1030 445 L1068 445" class="flow"/>
  <path d="M1420 445 L1458 445" class="flow"/>

  <!-- Loop arrow back to user -->
  <path d="M1635 640 C1635 860, 260 860, 260 650" class="flow loop"/>
  <text x="760" y="900" class="text">New interactions loop back to the user and continuously improve recommendations</text>

  <!-- Footer summary -->
  <rect x="90" y="955" width="1740" height="70" rx="16" fill="#ffffff" stroke="#d2def0"/>
  <text x="120" y="998" class="chip">Flow Summary: User activity -> Database (algorithm + bookmarks + likes + profile) -> Backend API -> Frontend display -> feedback loop</text>
</svg>
