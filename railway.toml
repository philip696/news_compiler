[build]
builder = "dockerfile"

[deploy]
startCommand = "bash -c 'cd backend && uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}'"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5

[[services]]
name = "backend"
protocol = "http"
port = 8000

[[services.routing]]
domain = "${{RAILWAY_APP_DOMAIN}}"
