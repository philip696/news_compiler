[build]
builder = "dockerfile"

[deploy]
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000} --timeout-keep-alive 5"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[[services]]
name = "backend"
protocol = "http"
port = 8000

[[services.routing]]
domain = "${{RAILWAY_APP_DOMAIN}}"
