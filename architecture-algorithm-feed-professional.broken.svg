<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Clean feed architecture with left to right algorithm flow">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7faff"/>
      <stop offset="100%" stop-color="#f6fff8"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fbff"/>
    </linearGradient>
    <style>
      .title { font: 700 48px 'Segoe UI', Arial, sans-serif; fill: #1b2f4d; }
      .subtitle { font: 400 21px 'Segoe UI', Arial, sans-serif; fill: #486281; }
      .laneTitle { font: 700 24px 'Segoe UI', Arial, sans-serif; fill: #1f3556; }
      .stage { font: 700 22px 'Segoe UI', Arial, sans-serif; fill: #1f3556; }
      .text { font: 400 17px 'Segoe UI', Arial, sans-serif; fill: #375374; }
      .small { font: 600 14px 'Segoe UI', Arial, sans-serif; fill: #194066; }
      .panel { fill: #ffffff; stroke: #d8e3f2; stroke-width: 2; rx: 18; }
      .card { fill: url(#card); stroke: #a8bedb; stroke-width: 2; rx: 18; }
      .dbCard { fill: #edf5ff; stroke: #b4c8e6; stroke-width: 2; rx: 18; }
      .apiCard { fill: #ecf9f0; stroke: #add7bb; stroke-width: 2; rx: 12; }
      .loopCard { fill: #fff7ec; stroke: #e3cb99; stroke-width: 2; rx: 14; }
      .arrow { stroke: #3d649e; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .dashed { stroke-dasharray: 10 8; }
    </style>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M0,0 L14,7 L0,14 z" fill="#3d649e"/>
    </marker>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>

  <text x="68" y="82" class="title">Algorithm Feed Architecture</text>
  <text x="68" y="118" class="subtitle">Database -> Backend API -> Ranking Service -> User Frontend -> A -> B -> C -> D -> E -> Database</text>

  <rect x="50" y="145" width="1820" height="340" class="panel"/>
  <rect x="50" y="515" width="1820" height="500" class="panel"/>

  <text x="78" y="184" class="laneTitle">Primary Flow</text>
  <text x="78" y="554" class="laneTitle">Algorithm Loop (Left to Right)</text>

  <rect x="90" y="210" width="370" height="245" class="dbCard"/>
  <text x="116" y="252" class="stage">1. Database</text>
  <text x="116" y="286" class="text">Algorithm state</text>
  <text x="116" y="314" class="text">Profiles, likes, bookmarks</text>
  <text x="116" y="342" class="text">Interaction history</text>

  <rect x="500" y="210" width="340" height="245" class="card"/>
  <text x="526" y="252" class="stage">2. Backend API</text>
  <text x="526" y="286" class="text">Reads and writes database</text>
  <text x="526" y="314" class="text">Serves feed and behavior APIs</text>

  <rect x="880" y="210" width="340" height="245" class="card"/>
  <text x="906" y="252" class="stage">3. Ranking Service</text>
  <text x="906" y="286" class="text">Scores candidate stories</text>
  <text x="906" y="314" class="text">Builds ranked response</text>

  <rect x="1260" y="210" width="560" height="245" class="card"/>
  <text x="1286" y="252" class="stage">4. User Frontend</text>
  <text x="1286" y="286" class="text">Displays personalized feed</text>
  <text x="1286" y="314" class="text">Collects user behavior events</text>

  <rect x="500" y="160" width="340" height="38" class="apiCard"/>
  <text x="612" y="185" class="small">External News API</text>

  <path d="M460 420 L498 420" class="arrow"/>
  <path d="M840 420 L878 420" class="arrow"/>
  <path d="M1220 420 L1258 420" class="arrow"/>
  <path d="M670 198 L670 208" class="arrow dashed"/>

  <rect x="90" y="610" width="310" height="330" class="loopCard"/>
  <text x="114" y="654" class="stage">A. Track</text>
  <text x="114" y="688" class="text">Capture click/read/like</text>
  <text x="114" y="716" class="text">Capture bookmark/skip</text>

  <rect x="430" y="610" width="310" height="330" class="loopCard"/>
  <text x="454" y="654" class="stage">B. Create Event</text>
  <text x="454" y="688" class="text">Build behavior payload</text>
  <text x="454" y="716" class="text">Add user and article ids</text>

  <rect x="770" y="610" width="310" height="330" class="loopCard"/>
  <text x="794" y="654" class="stage">C. Send to API</text>
  <text x="794" y="688" class="text">Post event to backend</text>
  <text x="794" y="716" class="text">Validate and process</text>

  <rect x="1110" y="610" width="310" height="330" class="loopCard"/>
  <text x="1134" y="654" class="stage">D. Refresh Feed</text>
  <text x="1134" y="688" class="text">Request updated ranking</text>
  <text x="1134" y="716" class="text">Render new feed</text>

  <rect x="1450" y="610" width="360" height="330" class="loopCard"/>
  <text x="1474" y="654" class="stage">E. Save to Database</text>
  <text x="1474" y="688" class="text">Persist algorithm updates</text>
  <text x="1474" y="716" class="text">Persist profile and reactions</text>

  <path d="M400 880 L428 880" class="arrow"/>
  <path d="M740 880 L768 880" class="arrow"/>
  <path d="M1080 880 L1108 880" class="arrow"/>
  <path d="M1420 880 L1448 880" class="arrow"/>

  <path d="M1470 455 C1470 545, 245 545, 245 610" class="arrow dashed"/>
  <path d="M1630 940 C1630 1000, 230 1000, 230 455" class="arrow dashed"/>

  <rect x="70" y="1032" width="1780" height="28" rx="8" fill="#ffffff" stroke="#d4e0f1"/>
  <text x="86" y="1051" class="small">Clear flow: top row serves feed, bottom row learns from behavior, then loops back to database.</text>
</svg>
